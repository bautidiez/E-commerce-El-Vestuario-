<div class="login-page"
    style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/assets/portada3.png') center/cover no-repeat fixed !important;">
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="/assets/logo.png" alt="Logo" class="login-logo">
                <h1>El Vestuario</h1>
                <p>Inicia sesión para gestionar tus compras y ofertas</p>
            </div>

            <form (ngSubmit)="login()" class="login-form">
                <div class="form-group">
                    <label>Email o Usuario</label>
                    <input type="text" [(ngModel)]="email" name="email" placeholder="Email o nombre de usuario"
                        required>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">Contraseña</label>
                        <a routerLink="/recuperar-password"
                            style="color: #3b82f6; font-size: 13px; text-decoration: none; font-weight: 500;">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="error-message" *ngIf="error">
                    ⚠️ {{ error }}
                </div>

                <div class="form-group" style="margin-bottom: 15px; display: flex; justify-content: center; transform: scale(0.9); transform-origin: center;">
                    <re-captcha (resolved)="onCaptchaResolved($event)"
                        siteKey="6LfgSlssAAAAALlGb4Fnu9-AoIkKNGOCAGydHwOB"></re-captcha>
                </div>

                <button type="submit" class="btn-login" [disabled]="loading">
                    <span *ngIf="!loading">Iniciar Sesión</span>
                    <span *ngIf="loading">Validando...</span>
                </button>

                <div class="google-divider">
                    <span>O continuá con</span>
                </div>

                <button type="button" class="btn-google" (click)="loginConGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Ingresar con Google
                </button>

                <div class="register-link">
                    <p>¿No tienes cuenta? <a routerLink="/registro">Crea una ahora</a></p>
                </div>

                <div class="home-link">
                    <a routerLink="/">← Volver a la tienda</a>
                </div>
            </form>
        </div>
    </div>
</div>
