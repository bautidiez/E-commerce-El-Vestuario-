<div class="login-page">
  <!-- Portada optimizada con Lazy Load y Fallback -->
  <img 
      src="/assets/portada3.png" 
      loading="lazy" 
      class="bg-portada" 
      onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 1200 400\'%3E%3Crect fill=\'%23333\' width=\'1200\' height=\'400\'/%3E%3C/svg%3E'"
      alt="Portada"
  >
  <div class="container">
    <div class="login-card">
      <div class="login-header">
        <img src="/assets/logo.png" alt="Logo" class="login-logo">
        <h1>Panel de Control</h1>
        <p>Administración de El Vestuario</p>
      </div>

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" [(ngModel)]="username" name="username" placeholder="Tu usuario" required>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="error-message" *ngIf="error">
          ⚠️ {{ error }}
        </div>

        <button type="submit" class="btn-login" [disabled]="loading">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading">Autenticando...</span>
        </button>

        <div class="admin-info">
          <p>Acceso restringido solo para personal autorizado.</p>
        </div>

        <div class="home-link">
          <a routerLink="/">← Volver a la tienda</a>
        </div>
      </form>
    </div>
  </div>
</div>
