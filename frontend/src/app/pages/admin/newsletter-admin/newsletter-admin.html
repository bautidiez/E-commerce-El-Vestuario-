<div class="newsletter-admin-page">
    <div class="panel-header">
        <div class="container">
            <div class="header-content">
                <div class="header-title">
                    <button class="btn-back" routerLink="/admin/gestion" title="Volver al Panel de Gestión">
                        <span class="icon">←</span>
                    </button>
                    <h1>Gestión de Newsletter</h1>
                </div>
                <div class="header-actions">
                    <a routerLink="/" class="btn btn-secondary">Ver Tienda</a>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-content">
        <div class="container">
            <p class="subtitle">Creá y enviá campañas de email marketing a tus suscriptores.</p>
        </div>
    </div>

    <div class="newsletter-grid">
        <div class="compose-card">
            <div class="form-group">
                <label>Asunto del Correo</label>
                <input type="text" [(ngModel)]="subject" placeholder="Ej: ¡Llegaron nuevos ingresos! 🚀">
            </div>

            <div class="form-group">
                <label>Mensaje</label>
                <quill-editor [(ngModel)]="content" placeholder="Escribí tu mensaje aquí..."
                    [styles]="{height: '300px'}" class="editor-container">
                </quill-editor>
            </div>
        </div>

        <div class="actions-card">
            <h3>Acciones</h3>


            <div class="test-section">
                <label>Email de Prueba</label>
                <input type="email" [(ngModel)]="testEmail" placeholder="tu@email.com">
                <button class="btn-test" (click)="send(true)" [disabled]="isLoading">
                    <span *ngIf="!isLoading">🧪 Probar Envío</span>
                    <span *ngIf="isLoading" class="loader-dots">⏳ Enviando...</span>
                </button>
            </div>

            <div class="divider"></div>

            <div class="send-section">
                <p class="warning-text">⚠️ Cuidado: Esto enviará el correo a todos los clientes suscritos.</p>
                <button class="btn-send-all" (click)="send(false)" [disabled]="isLoading">
                    <span *ngIf="!isLoading">✈️ Enviar a TODOS</span>
                    <span *ngIf="isLoading">⏳ Enviando...</span>
                </button>
            </div>

            <div *ngIf="lastStats" class="stats-box success">
                <h4>Último Envío:</h4>
                <p>Enviados: <strong>{{ lastStats.sent_count }}</strong> / {{ lastStats.total_targets }}</p>
            </div>
        </div>
    </div>
</div>
